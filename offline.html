<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pinterest Downloader Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(140deg, #f6f0e4 0%, #efe8d8 100%);
        color: #21342d;
      }

      main {
        max-width: 560px;
        margin: 24px;
        padding: 32px;
        border-radius: 24px;
        background: rgba(255, 250, 240, 0.92);
        box-shadow: 0 24px 60px rgba(33, 52, 45, 0.12);
      }

      h1 {
        margin-top: 0;
        font-size: 2rem;
      }

      p {
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Pinterest Downloader is offline</h1>
      <p>The app shell is available, but internet access is still required to validate Pinterest URLs and fetch media files.</p>
      <p>Reconnect and reload to continue downloading.</p>
    </main>
  </body>
</html>
